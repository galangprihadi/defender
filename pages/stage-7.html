<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Defender</title>

    <link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../css/defender-v2.css">
</head>
<body>

    <div id="curtain"></div>
    <div id="game-info"></div>
    <div class="game-panel">
        <div class="text" id="intro"></div>
        <div class="chat-panel" id="chatPanel"></div>
        <div class="quest-panel" id="questPanel"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="../js/defender-v3.js"></script>

    <script>
        const game = new Defender({
            gameInfo: "Stage 7 - Impersonation & Account Security Phishing",
            home: "../index.html",
            next: "stage-8.html",

            intro: `Anda menerima pesan dari seseorang yang mengaku sebagai tim keamanan dari platform marketplace 
            tempat Anda berjualan. Ia mengatakan ada aktivitas mencurigakan pada akun Anda dan meminta Anda 
            segera melakukan verifikasi agar akun tidak diblokir.`,

            picture: "../images/working.png",
            id: "+62 1234 1234 1234",
            chat: [
                `x: Halo, kami dari tim keamanan marketplace.`,
                `x: Kami mendeteksi adanya aktivitas login yang tidak biasa pada akun Anda.`,
                `x: Untuk mencegah penyalahgunaan, akun Anda akan dibatasi dalam 30 menit jika tidak diverifikasi.`,
                `y: Aktivitas seperti apa ya?`,
                `x: Login dari perangkat baru dengan lokasi yang berbeda.`,
                `x: Bisa saja ini Anda, tapi kami perlu konfirmasi segera.`,
                `y: Verifikasinya bagaimana?`,
                `x: Silakan klik link berikut untuk verifikasi akun Anda:`,
                `x: bit.ly/verify-akun-secure`,
                `x: Setelah itu, login dan masukkan kode verifikasi yang akan dikirim ke nomor Anda.`,
                `y: Ini dari sistem resmi ya?`,
                `x: Ya, ini prosedur standar keamanan.`,
                `x: Jika tidak dilakukan sekarang, akun Anda berisiko diblokir sementara.`,
                `x: Banyak pengguna kehilangan akses karena terlambat verifikasi.`,
                `x: Kami sarankan segera dilakukan.`,
            ],

            quest: [
                [
                    `Apa tindakan paling tepat dalam situasi ini?`,
                    [
                        `Tidak mengklik link tersebut, lalu memeriksa notifikasi langsung melalui aplikasi atau website resmi marketplace.`,
                        `Mengklik link dan melakukan verifikasi karena terlihat seperti dari tim resmi.`,
                        `Mengklik link tetapi tidak memasukkan data sensitif.`,
                        `Menunggu beberapa saat untuk melihat apakah akun benar-benar dibatasi.`,
                    ],
                    [
                        `Selalu gunakan kanal resmi untuk verifikasi. Jangan mengikuti instruksi dari link yang mencurigakan.`,
                        `Pesan terlihat resmi, tetapi bisa dimanipulasi untuk menipu pengguna.`,
                        `Membuka link tetap berisiko karena bisa mengarahkan ke halaman palsu.`,
                        `Menunda tanpa verifikasi aktif bisa membuat Anda tetap tidak mengetahui apakah pesan tersebut valid.`,
                    ],
                ],

                [
                    `Mengapa pesan ini patut dicurigai meskipun terlihat seperti berasal dari pihak resmi?`,
                    [
                        `Karena meminta tindakan melalui link eksternal yang tidak jelas asalnya, bukan melalui sistem resmi aplikasi.`,
                        `Karena menggunakan bahasa yang cukup formal.`,
                        `Karena mengandung informasi tentang keamanan akun.`,
                        `Karena menyebut adanya aktivitas login yang berbeda.`,
                    ],
                    [
                        `Pihak resmi biasanya mengarahkan pengguna ke dalam aplikasi, bukan melalui link yang tidak dapat diverifikasi.`,
                        `Bahasa formal bisa ditiru dan tidak menjamin keaslian.`,
                        `Informasi keamanan bisa digunakan untuk meningkatkan kepercayaan korban.`,
                        `Notifikasi seperti ini bisa digunakan sebagai umpan untuk membuat pengguna panik.`,
                    ],
                ],

                [
                    `Jika Anda khawatir akun Anda benar-benar bermasalah, langkah paling bijak adalah?`,
                    [
                        `Masuk ke aplikasi atau website resmi secara mandiri untuk mengecek status akun dan notifikasi keamanan.`,
                        `Menggunakan link yang diberikan karena lebih cepat.`,
                        `Membalas pesan tersebut untuk meminta klarifikasi sebelum bertindak.`,
                        `Mencoba memasukkan kode verifikasi untuk memastikan apakah benar diperlukan.`,
                    ],
                    [
                        `Verifikasi langsung melalui kanal resmi memastikan Anda tidak mengikuti instruksi palsu.`,
                        `Kecepatan tidak boleh mengorbankan keamanan.`,
                        `Membalas tidak menjamin bahwa pihak tersebut benar-benar resmi.`,
                        `Memberikan kode tanpa memastikan sumbernya dapat berisiko tinggi.`,
                    ],
                ],

                [
                    `Apa risiko paling serius jika Anda mengikuti instruksi dari link tersebut dan memasukkan data Anda?`,
                    [
                        `Akun Anda dapat diambil alih karena kredensial yang Anda masukkan digunakan oleh pihak lain.`,
                        `Anda akan menerima lebih banyak pesan serupa di masa depan.`,
                        `Proses login Anda menjadi lebih lambat.`,
                        `Akun Anda akan keluar secara otomatis dari perangkat lain.`,
                    ],
                    [
                        `Login melalui halaman palsu dapat memberikan akses langsung ke pihak lain untuk mengendalikan akun Anda.`,
                        `Pesan tambahan mungkin terjadi, tetapi bukan dampak utama.`,
                        `Performa login bukan risiko utama dalam konteks ini.`,
                        `Logout dari perangkat lain bukan dampak utama dibandingkan kehilangan akses akun.`,
                    ],
                ],
            ],
        });
    </script>
</body>
</html>
